name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Clone shadmin CLI source
        run: git clone --depth 1 https://github.com/ahaodev/shadmin.git _src

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: _src/cli/go.sum

      - name: Build binaries
        working-directory: _src/cli
        run: |
          mkdir -p ../../bin
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA}"
          for TARGET in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS=${TARGET%/*}
            GOARCH=${TARGET#*/}
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            OUT="shadmin-cli-${GOOS}-${GOARCH}${EXT}"
            echo "→ Building $OUT"
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" -o ../../bin/$OUT .
          done
          ls -lh ../../bin/

      - name: Sync docs and binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cp _src/cli/README.md README.md
          cp _src/cli/skill/shadmin-cli/SKILL.md SKILL.md
          mkdir -p examples
          cp _src/cli/skill/shadmin-cli/examples/* examples/
          # Remove nested .git so it's not treated as a submodule
          rm -rf _src
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md SKILL.md examples/ bin/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "release: shadmin-cli ${VERSION}"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          gh release create "${VERSION}" \
            --title "shadmin-cli ${VERSION}" \
            --generate-notes \
            bin/*
